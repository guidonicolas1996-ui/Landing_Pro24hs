<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Landing profesional con acceso VIP y llamado a WhatsApp." />
    <meta name="theme-color" content="#060b1d" />
    <title>Casino Oficial - Acceso VIP</title>
    <link rel="icon" type="image/png" href="img/favicon.png" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="top-actions">
      <a href="settings.html" class="analytics-button" aria-label="Configuración">⚙️</a>
    </div>

    <div class="page-shell">
      <header class="hero-header">
        <section class="hero-card" aria-labelledby="hero-title">
          <h1 id="hero-title">BIENVENID@ A TU <span class="gradient-text">CASINO DE CONFIANZA</span></h1>
          <p class="helper-text" id="helper-text">CARGAS Y RETIROS AL INSTANTE</p>
        </section>
        <!-- <p class="hero-header__badge" id="access-badge">ACCESO VIP</p> -->
      </header>
      
      <main class="main-content">
        <div class="promo-banner">
          <div class="promo-banner__left">
            <p class="promo-banner__label" id="promoLabel">PARA USUARIOS NUEVOS</p>
            <h2 class="promo-banner__title" id="promoTitle"><span class="gradient-text">EXTRA</span> DE BONO EN TU <span class="gradient-text">PRIMERA CARGA</span></h2>
            <p class="promo-banner__note" id="promoNote">CARGAS Y RETIROS AL INSTANTE</p>
          </div>
          <div class="promo-banner__right">
            <div class="mascot-carousel" id="mascot-carousel" aria-live="polite">
              <div id="mascot-left" class="mascot-carousel__item mascot-carousel__item--left" aria-hidden="true">
                <img src="img/mascot.png" alt="" class="hero-header__mascot mascot-carousel__image" />
              </div>
              <div id="active-mascot" class="mascot-carousel__item mascot-carousel__item--center">
                <img src="img/mascot.png" alt="" class="hero-header__mascot mascot-carousel__image" />
              </div>
              <div id="mascot-right" class="mascot-carousel__item mascot-carousel__item--right" aria-hidden="true">
                <img src="img/mascot.png" alt="" class="hero-header__mascot mascot-carousel__image" />
              </div>
            </div>
          </div>
        </div>

        <section class="hero-card" aria-labelledby="hero-title">
          <!-- <p id="hero-copy">Escribinos apretando el botón de abajo</span></span></p> -->
          <div class="hero-card__actions">
            <div class="logo-carousel" id="logo-carousel" aria-live="polite">
              <div id="logo-left" class="mascot-carousel__item mascot-carousel__item--left" aria-hidden="true">
                <img src="img/logo_view.png" alt="" class="mascot-carousel__logo" />
              </div>
              <div id="active-logo" class="mascot-carousel__item mascot-carousel__item--center">
                <img src="img/logo_view.png" alt="" class="mascot-carousel__logo" />
              </div>
              <div id="logo-right" class="mascot-carousel__item mascot-carousel__item--right" aria-hidden="true">
                <img src="img/logo_view.png" alt="" class="mascot-carousel__logo" />
              </div>
            </div>
            <button type="button" class="whatsapp-button whatsapp-button--loading" id="whatsapp-button" aria-label="Abrir WhatsApp" disabled>
              <span class="button-aura"></span>
              <img src="img/whatsapp.png" alt="" aria-hidden="true" />
              <span id="cta-label">WHATSAPP ACTIVO 24/7</span>
              <span class="whatsapp-button__progress">
                <span class="whatsapp-button__progress-fill"></span>
              </span>
            </button>
          </div>
        </section>

        <footer class="footer">
          <p id="footer-text1">Bono no extraíble, válido solo para slots. Mínimo de carga: $2.000.</p>
          <p id="footer-text2">Advertencia de juego responsable (+18) - © 2026</p>
        </footer>
      </main>
    </div>

    <script type="module" src="js/main.js?v=13"></script>
  </body>
</html>
